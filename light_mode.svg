<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" font-family="ConsolasFallback,Consolas,monospace" width="100%" viewBox="0 0 1500 530" font-size="16px">
<style>
@font-face {
src: local('Consolas'), local('Consolas Bold');
font-family: 'ConsolasFallback';
font-display: swap;
-webkit-size-adjust: 109%;
size-adjust: 109%;
}
.key {fill: #953800;}
.value {fill: #0a3069;}
.addColor {fill: #1a7f37;}
.delColor {fill: #cf222e;}
.cc {fill: #c2cfde;}
text, tspan {white-space: pre;}
.s1 { animation: s1v 50s linear infinite; }
.s2 { animation: s2v 50s linear infinite; }
.s3 { animation: s3v 50s linear infinite; }
.s4 { animation: s4v 50s linear infinite; }
