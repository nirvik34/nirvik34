@keyframes s4v { 0% {opacity:0} 75% {opacity:0} 76% {opacity:1} 100% {opacity:1} }
.apple1 { animation: a1v 50s linear infinite; }
.apple2 { animation: a2v 50s linear infinite; }
.apple3 { animation: a3v 50s linear infinite; }
@keyframes a1v { 0% {opacity:1} 35% {opacity:1} 36% {opacity:0} 95% {opacity:0} 100% {opacity:1} }
@keyframes a2v { 0% {opacity:1} 58% {opacity:1} 59% {opacity:0} 95% {opacity:0} 100% {opacity:1} }
@keyframes a3v { 0% {opacity:1} 75% {opacity:1} 76% {opacity:0} 95% {opacity:0} 100% {opacity:1} }
</style>
